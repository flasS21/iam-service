_format_version: "3.0"
_transform: true

services:
  - name: iam-backend
    url: http://iam-api:8090   
    tags: ["iam", "phase1"]
    routes:
      - name: iam-route
        paths:
          - /api
          - /health
          - /oauth
          - /auth
          - /admin
          - /dashboard
          # - /auth/logout  
          # - /auth/logout-all

        strip_path: false
        preserve_host: false
        protocols:
          - http
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

    plugins:

      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

      - name: rate-limiting
        config:
          minute: 60
          policy: local
          limit_by: ip
        enabled: true
        
      - name: file-log
        config:
          path: /dev/stdout
          reopen: true
        enabled: true

      - name: request-size-limiting
        config:
          allowed_payload_size: 2  # 2MB
        enabled: true

      - name: response-transformer
        config:
          add:
            headers:
              - "X-Frame-Options: DENY"
              - "X-Content-Type-Options: nosniff"
              - "Referrer-Policy: no-referrer"
        enabled: true


routes:
  - name: gateway-health
    paths:
      - /gateway/health
    methods:
      - GET
    plugins:
      - name: request-termination
        config:
          status_code: 200
          message: '{"status":"ok"}'